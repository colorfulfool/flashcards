<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godan Conjugation Matrix Drill</title>
    <style>
        :root {
            --bg: #131314;
            --card-bg: #1e1f20;
            --text: #f8fafc;
            --text-muted: #626262;
            --accent: #38bdf8;
            --border: #334155;
            --success: #377e22;
            --failure: #ea3323;
            --answer-bg: #1d4974;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 550px;
            text-align: center;
        }
        .progress {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px 30px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }
        .answer-bg {
          background-color: var(--answer-bg);
        }
        .direction {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 15px;
        }
        .prompt {
            font-size: 2rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .target {
            font-size: 2.2rem;
            font-weight: 700;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        button {
            background-color: var(--card-bg);
            color: var(--text);
            border: transparent;
            padding: 12px;
            border-radius: 128px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:active { opacity: 0.6; }
        #wrong-btn svg { stroke: var(--failure); }
        #right-btn svg { stroke: var(--success); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="progress"><span id="current-idx">1</span> / <span id="total-cards">0</span></div>

<div class="container">
    
    <div class="card" id="flashcard">
        <div class="prompt" id="card-prompt">---</div>
        
        <div class="hidden" id="answer-block">
            <div class="target" id="card-target">---</div>
        </div>
    </div>

    <div class="controls hidden" id="controls">
      <button id="wrong-btn">
        <svg width="12" height="12" viewBox="0 0 10 10" preserveAspectRatio="xMidYMid slice">
          <line x1="0" y1="0" x2="10" y2="10" stroke-width="2" />
          <line x1="10" y1="0" x2="0" y2="10" stroke-width="2" />
        </svg>
      </button>
      <button id="right-btn">
        <svg width="12" height="12" viewBox="0 0 10 10" preserveAspectRatio="xMidYMid slice">
          <path d="M 0 5 L 4 10 L 10 0" stroke-width="2" fill="none" />
        </svg>
      </button>
    </div>
</div>

<div>
  <label><input type="checkbox" name="track-learning" /> Track learning</label>
</div>

<script>
// The raw deck data matching the system specs
const deck = [
  {
    "type": "coercion",
    "prompt": "書く (かく) → Negative Base",
    "target": "書か (かか)",
  },
  {
    "type": "recognition",
    "prompt": "話せ (はなせ)",
    "target": "話す (はなす) [E-Row / Imperative]",
  },
  {
    "type": "coercion",
    "prompt": "言う (いう) → Negative Base",
    "target": "言わ (いわ)",
  },
  {
    "type": "recognition",
    "prompt": "持てば (もてば)",
    "target": "持つ (もつ) [E-Row → Conditional Suffix]",
  },
  {
    "type": "coercion",
    "prompt": "泳ぐ (およぐ) → Volitional Base",
    "target": "泳ご (およご)",
  },
  {
    "type": "recognition",
    "prompt": "死にます (しにます)",
    "target": "死ぬ (しぬ) [I-Row → Polite Suffix]",
  },
  {
    "type": "coercion",
    "prompt": "呼ぶ (よぶ) → Potential Base",
    "target": "呼ば (よべ)",
  },
  {
    "type": "recognition",
    "prompt": "待とう (まとう)",
    "target": "待つ (まつ) [O-Row → Volitional Suffix]",
  },
  {
    "type": "coercion",
    "prompt": "切る (きる) → Polite Base",
    "target": "切り (きり)",
  },
  {
    "type": "recognition",
    "prompt": "買わない (かわない)",
    "target": "買う (かう) [A-Row → Negative Suffix]",
  }
];

let currentIdx = 0;
let showingAnswer = false;
let trackingLearning = false;

const cardEl = document.getElementById('flashcard');
const promptEl = document.getElementById('card-prompt');
const answerBlockEl = document.getElementById('answer-block');
const targetEl = document.getElementById('card-target');
const controlsEl = document.getElementById('controls');
const checkboxEl = document.querySelector('input[name=track-learning]');

document.getElementById('total-cards').textContent = deck.length;

function renderCard() {
    const item = deck[currentIdx];
    document.getElementById('current-idx').textContent = currentIdx + 1;
    
    promptEl.textContent = item.prompt;
    targetEl.textContent = item.target;
    
    promptEl.classList.remove('hidden');
    answerBlockEl.classList.add('hidden');
    cardEl.classList.remove('answer-bg');
    showingAnswer = false;
}

function showAnswer() {
    promptEl.classList.add('hidden');
    answerBlockEl.classList.remove('hidden');
    cardEl.classList.add('answer-bg');
    showingAnswer = true;
}

function nextCard() {
    currentIdx = (currentIdx + 1) % deck.length;
    renderCard();
}

cardEl.addEventListener('click', () => {
  if (showingAnswer) {
    nextCard();
  } else {
    showAnswer();
  } 
});

checkboxEl.addEventListener('change', (event) => {
  if (event.target.checked) {
    controlsEl.classList.remove('hidden'); 
  } else {
    controlsEl.classList.add('hidden'); 
  }
});

// Handle spaces and arrows for swift execution
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (!showingAnswer) showAnswer();
        else nextCard();
    } else if (e.code === 'ArrowRight' && showingAnswer) {
        nextCard();
    }
});

// Init
renderCard();
</script>
</body>
</html>

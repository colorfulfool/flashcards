<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugation Drill</title>
    <style>
        :root {
            --bg: #fffeff;
            --card-bg: #f0f3f8;
            --answer-bg: #cae5fc;
            --text: #1f1f1f;
            --text-muted: #a9a9aa;
            --success: #377e22;
            --success-bg: #377e2225;
            --failure: #ea3323;
            --failure-bg: #ea332325;
        }
        @media (prefers-color-scheme: dark) {
          :root {
              --bg: #131314;
              --card-bg: #1e1f20;
              --answer-bg: #1d4974;
              --text: #f8fafc;
              --text-muted: #626262;
          }
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100dvh;
            margin: 0;
            padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 20px);
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 550px;
            text-align: center;
        }
        .top-bar {
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .progress {
            color: var(--text-muted);
        }
        .correct {
          background-color: var(--success-bg);
          padding: 4px 8px;
          border-radius: 12px;
          display: flex;
          gap: 6px; 
          align-items: center;
        }
        svg { display: block; }
        .card {
            border-radius: 12px;
            padding: 40px 30px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }
        .question-bg {
          background-color: var(--card-bg);
        }
        .answer-bg {
          background-color: var(--answer-bg);
        }
        .prompt {
            font-size: 1.8rem;
            margin: 10px 0;
        }
        .target {
            font-size: 1.8rem;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        button {
            background-color: var(--card-bg);
            color: var(--text);
            border: transparent;
            padding: 16px;
            border-radius: 128px;
            cursor: pointer;
        }
        button:active { opacity: 0.6; }
        #wrong-btn { background-color: var(--failure-bg); stroke: var(--failure); }
        #right-btn { background-color: var(--success-bg); stroke: var(--success); }
        .track-learning { display: flex; gap: 4px; }
        .hidden { display: none !important; }
        .decks-select-container {
          display: flex;
          gap: 8px;
        }
        #decks-btn {
            font-size: 0.9rem;
            padding: 4px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #type-filter {
            font-size: 0.9rem;
            width: 25px;
            height: 25px;
            padding: 0px;
            font-weight: 600;
        }
        #decks-modal {
          background-color: var(--card-bg);
          color: var(--text);
          border: transparent;
          border-radius: 8px;
          padding: 24px 28px;
        }
        #decks-modal > div {
          display: flex;
          flex-direction: column;
          gap: 8px;
        }
        #decks-modal::backdrop {
          background-color: #00000090;
        }
        #decks-count {
          color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="top-bar">
  <div class="progress">
    <span id="current-idx">1</span> / <span id="total-cards">0</span>
  </div>
  <div class="decks-select-container">
    <button id="decks-btn" commandfor="decks-modal" command="show-modal">
      <div>Decks</div>
      <span id="decks-count"></span>
    </button>
    <button id="type-filter">B</button>
  </div>
  <div class="correct hidden">
    <svg width="8" height="8" viewBox="0 0 10 10" preserveAspectRatio="xMidYMid slice">
      <path d="M 0 5 L 4 10 L 10 0" stroke="currentColor" stroke-width="1" fill="none" />
    </svg>
    <span id="correct-count">0</span>
  </div>
</div>

<dialog popover id="decks-modal">
  <div></div>
</dialog>

<div class="container">
    
    <div class="card question-bg" id="flashcard">
        <div class="prompt" id="card-prompt">---</div>
        
        <div class="hidden" id="answer-block">
            <div class="target" id="card-target">---</div>
        </div>
    </div>

    <div class="controls hidden" id="controls">
      <button id="wrong-btn">
        <svg width="14" height="14" viewBox="0 0 10 10" preserveAspectRatio="xMidYMid slice">
          <line x1="0" y1="0" x2="10" y2="10" stroke-width="1.5" />
          <line x1="10" y1="0" x2="0" y2="10" stroke-width="1.5" />
        </svg>
      </button>
      <button id="right-btn">
        <svg width="14" height="14" viewBox="0 0 10 10" preserveAspectRatio="xMidYMid slice">
          <path d="M 0 5 L 4 10 L 10 0" stroke-width="1.5" fill="none" />
        </svg>
      </button>
    </div>
</div>

<div>
  <label class="track-learning">
    <input type="checkbox" name="track-learning" /> Track learning
  </label>
</div>

<script>
let deck;
let allDecks = [];
let answeredDeck = [];
let typeFilter = 'both';

let currentIdx = 0;
let currentCard = null;
let showingAnswer = false;
let trackingLearning = false;

const cardEl = document.getElementById('flashcard');
const promptEl = document.getElementById('card-prompt');
const answerBlockEl = document.getElementById('answer-block');
const targetEl = document.getElementById('card-target');
const controlsEl = document.getElementById('controls');
const trackLearningCheck = document.querySelector('input[name=track-learning]');
const rightBtn = document.getElementById('right-btn');
const wrongBtn = document.getElementById('wrong-btn');
const typeFilterBtn = document.getElementById('type-filter');
const decksBtn = document.getElementById('decks-btn');

function renderCard(item) {
    currentCard = item;
    document.getElementById('current-idx').textContent = currentIdx + 1;
    
    promptEl.textContent = item.prompt;
    targetEl.textContent = item.target;
    
    promptEl.classList.remove('hidden');
    answerBlockEl.classList.add('hidden');
    cardEl.classList.remove('answer-bg');
    showingAnswer = false;
}

function showAnswer() {
    promptEl.classList.add('hidden');
    answerBlockEl.classList.remove('hidden');
    cardEl.classList.add('answer-bg');
    showingAnswer = true;
}

function hideAnswer() {
    promptEl.classList.remove('hidden');
    answerBlockEl.classList.add('hidden');
    cardEl.classList.remove('answer-bg');
    showingAnswer = false;
}

function nextCard() {
    const checked = new Set([...document.querySelectorAll('#decks-modal input[type=checkbox]:checked')].map(cb => cb.parentElement.textContent.trim()));
    const selected = deck.filter(card => !answeredDeck.includes(card) && checked.has(card.deck) && (typeFilter === 'both' || card.type === typeFilter));
    document.getElementById('total-cards').textContent = selected.length;
    document.getElementById('correct-count').textContent = answeredDeck.length;

    if (selected.length === 0) {
      cardEl.classList.remove('question-bg');
      cardEl.classList.remove('answer-bg');
      promptEl.textContent = 'All done!';
      targetEl.textContent = 'All done!';
      return;
    }

    currentIdx = Math.round(Math.random() * selected.length) - 1;
    renderCard(selected[currentIdx]);
}

cardEl.addEventListener('click', () => {
  if (showingAnswer) {
    if (trackingLearning) {
      hideAnswer();
    } else {
      nextCard();
    }
  } else {
    showAnswer();
  } 
});

trackLearningCheck.addEventListener('change', (event) => {
  if (event.target.checked) {
    trackingLearning = true;
    controlsEl.classList.remove('hidden'); 
    document.querySelector(".correct").classList.remove('hidden'); 
  } else {
    trackingLearning = false;
    controlsEl.classList.add('hidden'); 
    document.querySelector(".correct").classList.add('hidden'); 
  }
});

wrongBtn.addEventListener('click', nextCard);

typeFilterBtn.addEventListener('click', () => {
  typeFilter = typeFilter === 'both' ? 'coercion' : typeFilter === 'coercion' ? 'recognition' : 'both';
  typeFilterBtn.textContent = { both: 'B', coercion: 'C', recognition: 'R' }[typeFilter];
  nextCard();
});

rightBtn.addEventListener('click', () => {
  answeredDeck.push(currentCard);
  nextCard();
});

decksBtn.addEventListener('click', () => {
  document.getElementById('decks-modal').showPopover();
});

// Handle spaces and arrows for swift execution
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (!showingAnswer) showAnswer();
        else nextCard();
    } else if (e.code === 'ArrowRight' && showingAnswer) {
        nextCard();
    }
});

// Stages of learning:
// [x] row-based godan verbs
// [x] ichidan verbs
// [ ] add non-row-based forms (past, negative, past negative)
// [ ] add compound forms (causative-passive, tara conditional, desire)

fetch("decks.json")
  .then(resp => resp.json())
  .then(data => { 
    allDecks = data;
    deck = data.flatMap(d => d.cards.map(card => ({ ...card, deck: d.name })));
    populateDecksModal();
    nextCard();
  });

function populateDecksModal() {
  const modal = document.getElementById('decks-modal');
  const container = modal.querySelector('div');
  container.innerHTML = '';
  allDecks.forEach(d => {
    const label = document.createElement('label');
    label.className = 'track-learning';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = true;
    checkbox.addEventListener('change', () => {
      answeredDeck.length = 0;
      updateDecksCount();
      nextCard();
    });
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(d.name));
    container.appendChild(label);
  });
  updateDecksCount();
}

function updateDecksCount() {
  const count = document.querySelectorAll('#decks-modal input[type=checkbox]:checked').length;
  document.getElementById('decks-count').textContent = count;
}
</script>
</body>
</html>
